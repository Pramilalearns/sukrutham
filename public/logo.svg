<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <style>
      .text-main { font-family: 'Times New Roman', serif; font-weight: bold; fill: #C19A6B; }
      .text-sub { font-family: 'Times New Roman', serif; fill: #C19A6B; }
      .text-tag { font-family: 'Arial', sans-serif; fill: #C19A6B; font-size: 10px; }
      .icon { fill: #C19A6B; }
    </style>
  </defs>
  
  <!-- Stylized S with Wheat -->
  <path class="icon" d="M40 20 Q 60 20, 70 40 Q 80 60, 60 80 Q 40 100, 30 90 Q 20 80, 50 60" fill="none" stroke="#C19A6B" stroke-width="8" stroke-linecap="round" />
  <!-- Wheat Grains -->
  <ellipse cx="25" cy="30" rx="3" ry="8" class="icon" transform="rotate(-30 25 30)" />
  <ellipse cx="25" cy="45" rx="3" ry="8" class="icon" transform="rotate(-30 25 45)" />
  <ellipse cx="35" cy="20" rx="3" ry="8" class="icon" transform="rotate(10 35 20)" />
  <ellipse cx="35" cy="35" rx="3" ry="8" class="icon" transform="rotate(10 35 35)" />
  
  <!-- Text -->
  <text x="80" y="65" font-size="48" class="text-main">ukrutham</text>
  <text x="170" y="90" font-size="24" class="text-sub">Farmstay</text>
  <text x="172" y="105" class="text-tag">harvest happy memories</text>
</svg>
